services:
  - type: web
    name: verdolive-api
    runtime: node
    plan: free
    rootDir: verdo-back
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: JWT_COOKIE_EXPIRE
        value: 30
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEOAI_API_URL
        value: https://geoai-ahao.onrender.com/v1/site-analysis
